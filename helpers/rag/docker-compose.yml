services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-rag_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-rag_pass}
      POSTGRES_DB: ${PG_DATABASE:-rag_db}
    ports:
      - "${PG_PORT:-5435}:5432"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5053}:80"
    volumes:
      - rag_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  rag_pg_data:
  rag_pgadmin_data:
